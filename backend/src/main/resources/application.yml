spring:
  application:
    name: ai-interview-battle-room-backend
  profiles:
    default: local
  flyway:
    locations: classpath:db/migration

server:
  port: ${AI_INTERVIEW_SERVER_PORT:8080}

app:
  async-task:
    status-base-path: ${AI_INTERVIEW_TASK_STATUS_BASE_PATH:/api/tasks}
    poll-interval: ${AI_INTERVIEW_TASK_POLL_INTERVAL:3s}
    timeout: ${AI_INTERVIEW_TASK_TIMEOUT:10m}
  security:
    jwt:
      issuer: ${AI_INTERVIEW_JWT_ISSUER:ai-interview-battle-room}
      secret: ${AI_INTERVIEW_JWT_SECRET:change-this-dev-jwt-secret-to-a-32-byte-value}
      access-token-ttl: ${AI_INTERVIEW_JWT_ACCESS_TOKEN_TTL:2h}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [requestId=%X{requestId:-N/A}] - %msg%n"

